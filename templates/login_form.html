<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>

<body>
    <h1>Login Form</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form action="/login" method="post">

        <input type="text" name="username"></input>
        <input type="password" name="password"></input>
        <input type="submit" value="Login"></input>
        
    </form>
</body>
</html>

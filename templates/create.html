<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
</head>
<body>

    <h1>Create Post</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
    
    <form action="/create" method="post">

        <input type="text" name="post_title" placeholder="title"></input>
        <input type="text" name="post_author" placeholder="author"></input>
        <input type="text" name="post_content" placeholder="content"></input>
        <input type="submit" value="Create Post"></input>

    </form>
</body>
</html>
